<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Nerea Games - Princesas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(160deg,#1a0533 0%,#3d0a6e 50%,#1a0533 100%);min-height:100vh;}
#app{font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
#hdr{width:100%;background:linear-gradient(90deg,#e8008a,#ff6600);padding:11px 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #7a003a;flex-shrink:0;}
#hdr h1{font-size:clamp(17px,4.5vw,26px);color:#fff;text-shadow:0 3px 0 #7a003a;letter-spacing:1px;}
#main{display:flex;width:100%;max-width:640px;gap:12px;padding:12px;align-items:flex-start;}
#stage-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
#stage-container{position:relative;width:min(210px,44vw);}
#stage-img{width:100%;display:block;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
#outfit-layer,#acc-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#sparkle-wrap{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;overflow:hidden;border-radius:14px;}
.spark{position:absolute;width:10px;height:10px;border-radius:50%;animation:sparkle .7s ease-out forwards;pointer-events:none;}
@keyframes sparkle{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy));}}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.gm-btn{background:linear-gradient(90deg,#e8008a,#ff6600);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;padding:8px 16px;cursor:pointer;box-shadow:0 3px 0 #7a003a;}
.gm-btn.ghost{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);box-shadow:none;}
#panel{flex:1;display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:88vh;}
#panel::-webkit-scrollbar{width:4px;}#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:4px;}
.sec-label{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:2px;padding:6px 2px 3px;grid-column:1/-1;}
#items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.item-card{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);border-radius:13px;padding:6px 4px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;touch-action:none;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden;}
.item-card::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s;}
.item-card:active::before{background:rgba(255,255,255,.08);}
.item-card:active{transform:scale(1.07);box-shadow:0 5px 18px rgba(255,107,204,.65);}
.item-thumb{display:block;}
.item-card span{font-size:9.5px;font-weight:900;color:rgba(255,255,255,.8);text-align:center;line-height:1.2;}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;display:none;transform:translate(-50%,-50%) rotate(5deg) scale(1.12);}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"><h1>&#x1F478; Cambio de Look</h1></div>
  <div id="main">
    <div id="stage-wrap">
      <div id="stage-container">
        <img id="stage-img" alt="Nerea"/>
        <svg id="outfit-layer" viewBox="0 0 346 520" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
        <svg id="acc-layer"    viewBox="0 0 346 520" xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;"></svg>
        <div id="sparkle-wrap"></div>
      </div>
      <div class="btn-row">
        <button class="gm-btn" id="btn-save">&#x2665; Guardar look</button>
        <button class="gm-btn ghost" id="btn-reset">&#x2715; Quitar todo</button>
      </div>
    </div>
    <div id="panel"><div id="items-grid"></div></div>
  </div>
</div>
<div id="drag-ghost">
  <svg id="ghost-svg" viewBox="0 0 346 520" xmlns="http://www.w3.org/2000/svg" style="width:95px;height:143px;display:block;"></svg>
</div>

function b64url(b64,mime){var bin=atob(b64),arr=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return URL.createObjectURL(new Blob([arr],{type:mime||'image/png'}));}

var IMG_URL = b64url(IMG_B64,'image/png');
var wornOutfit=null, wornAccs={}, drag=null;

function gid(id){return document.getElementById(id);}

function renderStage(){
  var ol=gid('outfit-layer'), al=gid('acc-layer');
  ol.innerHTML = wornOutfit ? OUTFITS[wornOutfit].paths() : '';
  var h=''; Object.keys(wornAccs).forEach(function(k){if(wornAccs[k])h+=ACCS[k].paths();}); al.innerHTML=h;
}

function makeThumbSVG(html, isAcc){
  var vb = isAcc ? '0 0 346 520' : '0 0 346 520';
  var w = isAcc ? '60px' : '60px';
  var ht = isAcc ? '90px' : '90px';
  return '<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg" class="item-thumb" style="width:'+w+';height:'+ht+'">'+html+'</svg>';
}

function buildPanel(){
  var grid=gid('items-grid'); grid.innerHTML='';

  var ol=document.createElement('div'); ol.className='sec-label'; ol.textContent='VESTIDOS'; grid.appendChild(ol);
  Object.keys(OUTFITS).forEach(function(key){
    var o=OUTFITS[key];
    var card=document.createElement('div'); card.className='item-card';
    card.innerHTML=makeThumbSVG(o.paths(),false)+'<span>'+o.name+'</span>';
    card.dataset.type='outfit'; card.dataset.key=key;
    bindDrag(card); grid.appendChild(card);
  });

  var al=document.createElement('div'); al.className='sec-label'; al.textContent='ACCESORIOS'; grid.appendChild(al);
  Object.keys(ACCS).forEach(function(key){
    var a=ACCS[key];
    var card=document.createElement('div'); card.className='item-card';
    card.innerHTML=makeThumbSVG(a.paths(),true)+'<span>'+a.name+'</span>';
    card.dataset.type='acc'; card.dataset.key=key;
    bindDrag(card); grid.appendChild(card);
  });
}

function bindDrag(card){
  function start(cx,cy){
    drag={type:card.dataset.type,key:card.dataset.key};
    var gh=gid('drag-ghost'),gs=gid('ghost-svg');
    gs.innerHTML=drag.type==='outfit'?OUTFITS[drag.key].paths():ACCS[drag.key].paths();
    gh.style.display='block'; moveGhost(cx,cy);
  }
  card.addEventListener('mousedown',function(e){e.preventDefault();start(e.clientX,e.clientY);});
  card.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];start(t.clientX,t.clientY);},{passive:false});
}

function moveGhost(cx,cy){var gh=gid('drag-ghost');gh.style.left=cx+'px';gh.style.top=cy+'px';}

function endDrag(cx,cy){
  if(!drag)return;
  gid('drag-ghost').style.display='none';
  var s=gid('stage-img'), r=s.getBoundingClientRect();
  if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
    if(drag.type==='outfit') wornOutfit=drag.key;
    else wornAccs[drag.key]=!wornAccs[drag.key];
    renderStage();
    spawnSparkles(cx-r.left,cy-r.top);
    playChime();
  }
  drag=null;
}

document.addEventListener('mousemove',function(e){if(drag)moveGhost(e.clientX,e.clientY);});
document.addEventListener('mouseup',function(e){if(drag)endDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',function(e){if(drag){e.preventDefault();var t=e.touches[0];moveGhost(t.clientX,t.clientY);}},{passive:false});
document.addEventListener('touchend',function(e){if(drag){var t=e.changedTouches[0];endDrag(t.clientX,t.clientY);}});

function spawnSparkles(x,y){
  var w=gid('sparkle-wrap');
  var c=['#ffd700','#ff6bcc','#fff','#42e2ff','#ff6600','#ff88aa','#a8ff60'];
  for(var i=0;i<16;i++){
    var sp=document.createElement('div');sp.className='spark';
    var a=Math.random()*360,d=20+Math.random()*45;
    sp.style.left=x+'px';sp.style.top=y+'px';
    sp.style.background=c[0|Math.random()*c.length];
    sp.style.setProperty('--dx',(Math.cos(a*Math.PI/180)*d)+'px');
    sp.style.setProperty('--dy',(Math.sin(a*Math.PI/180)*d)+'px');
    sp.style.animationDelay=(Math.random()*.08)+'s';
    w.appendChild(sp);sp.addEventListener('animationend',function(){this.remove();});
  }
}

function playChime(){
  try{var ac=new(window.AudioContext||window.webkitAudioContext)();
    [1047,1319,1568,2093].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ac.currentTime+i*.07);
      g.gain.linearRampToValueAtTime(.1,ac.currentTime+i*.07+.02);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.07+.22);
      o.start(ac.currentTime+i*.07);o.stop(ac.currentTime+i*.07+.25);
    });
  }catch(e){}
}

gid('btn-reset').addEventListener('click',function(){wornOutfit=null;wornAccs={};renderStage();var b=gid('btn-reset');b.textContent='✓ Limpio!';setTimeout(function(){b.textContent='✕ Quitar todo';},1200);});
gid('btn-save').addEventListener('click',function(){playChime();var b=gid('btn-save');b.textContent='✓ Guardado!';setTimeout(function(){b.textContent='♥ Guardar look';},1800);});

gid('stage-img').src=IMG_URL;
buildPanel();

</script>
