<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nerea Games"/>
<meta name="theme-color" content="#e8008a"/>
<title>Nerea Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a0533;}
#app{font-family:'Nunito',sans-serif;height:100vh;background:linear-gradient(160deg,#1a0533,#3d0a6e,#1a0533);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#hdr{width:100%;flex-shrink:0;background:linear-gradient(90deg,#e8008a,#ff6600);padding:10px 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #7a003a;position:relative;}
#hdr h1{font-size:clamp(16px,4.5vw,26px);color:#fff;text-shadow:0 3px 0 #7a003a;letter-spacing:1px;}
#back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:20px;color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;padding:4px 10px;cursor:pointer;display:none;}
.scr{display:none;flex-direction:column;align-items:center;width:100%;flex:1;overflow:hidden;}

/* HOME */
#scr-home{justify-content:center;gap:16px;padding:20px;}
.home-title{font-size:clamp(22px,6vw,36px);color:#ff6bcc;font-weight:900;text-shadow:0 4px 0 #7a003a;text-align:center;}
.home-sub{font-size:clamp(12px,3vw,16px);color:rgba(255,255,255,.6);text-align:center;}
.home-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:400px;}
.home-card{background:rgba(255,255,255,.12);border:3px solid rgba(255,255,255,.22);border-radius:20px;padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s,background .15s;}
.home-card:active{transform:scale(.97);background:rgba(255,255,255,.2);}
.home-card-icon{font-size:36px;flex-shrink:0;}
.home-card-text{flex:1;}
.home-card-name{font-size:clamp(16px,4vw,20px);color:#fff;font-weight:900;}
.home-card-desc{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px;}

/* PUZZLE MENU */
#scr-puzzle-menu{overflow-y:auto;padding:12px;}
#pm-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:520px;}
.pm-card{background:rgba(255,255,255,.12);border:3px solid rgba(255,255,255,.22);border-radius:18px;padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;}
.pm-card:active{transform:scale(.97);}
.pm-thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;border:3px solid rgba(255,255,255,.4);flex-shrink:0;background:#333;}
.pm-info{flex:1;}
.pm-name{font-size:clamp(14px,3.5vw,17px);color:#fff;font-weight:900;}
.pm-best{font-size:11px;color:#ffd700;margin-top:2px;}
.pm-emoji{font-size:26px;}

/* PUZZLE GAME */
#scr-puzzle{flex-direction:column;gap:8px;padding:8px 10px 0;}
#p-stats{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border-radius:50px;border:2px solid rgba(255,255,255,.25);padding:5px 14px;flex-shrink:0;}
#p-time{font-size:clamp(13px,3vw,16px);font-weight:900;color:#ff6bcc;}
#p-moves{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,.8);font-weight:700;}
#board-wrap{position:relative;border-radius:14px;overflow:hidden;border:4px solid rgba(255,255,255,.35);box-shadow:0 0 30px rgba(232,0,138,.4);flex-shrink:0;}
#board-bg{position:absolute;inset:0;z-index:0;}
#p-board{position:relative;z-index:1;}
.pcell{position:relative;overflow:hidden;background:transparent;border:2px dashed rgba(255,255,255,.28);border-radius:5px;transition:border-color .15s;}
.pcell.phover{border:3px solid #ff6bcc;box-shadow:inset 0 0 10px rgba(255,107,204,.5);}
.pcell.correct{border:2px solid transparent!important;}
.shine{position:absolute;inset:0;z-index:10;pointer-events:none;border-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,.75) 0%,rgba(255,255,180,.3) 40%,rgba(255,255,255,0) 65%);opacity:0;transition:opacity .5s;}
.pcell.glow .shine{opacity:1;}
#p-tray-wrap{background:rgba(255,255,255,.1);border-radius:18px;border:3px solid rgba(255,255,255,.22);padding:8px 10px;width:100%;max-width:520px;flex-shrink:0;}
#p-tray-lbl{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);text-align:center;letter-spacing:2px;margin-bottom:5px;}
#p-tray{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;min-height:50px;}
.piece{border-radius:7px;border:3px solid rgba(255,255,255,.6);box-shadow:0 4px 10px rgba(0,0,0,.4);overflow:hidden;flex-shrink:0;cursor:grab;touch-action:none;background:#111;}
.piece.dragging{opacity:.2;}
.piece.gold{border:3px solid #ffd700!important;box-shadow:0 0 14px 4px rgba(255,215,0,.8)!important;}
#p-ghost{position:fixed;pointer-events:none;z-index:9999;border-radius:7px;overflow:hidden;border:3px solid #fff;box-shadow:0 10px 28px rgba(255,107,204,.7);display:none;transform:translate(-50%,-50%) rotate(4deg) scale(1.1);}
#pw-wrap{display:none;min-height:260px;width:100%;align-items:center;justify-content:center;background:rgba(0,0,10,.65);flex-shrink:0;}
#pw-wrap.show{display:flex;}
#pw-card{background:rgba(40,0,80,.95);border-radius:24px;border:4px solid rgba(255,255,255,.3);padding:20px 24px;text-align:center;max-width:270px;width:88%;}
#pw-card h2{font-size:32px;color:#ff6bcc;text-shadow:0 3px 0 #e8008a;}
#pw-card p{font-size:13px;color:#fff;margin:8px 0 14px;font-weight:700;line-height:1.6;white-space:pre-line;}
#stars-bar{display:flex;gap:3px;justify-content:center;margin:6px 0;}
.star{font-size:18px;opacity:.25;transition:opacity .3s,transform .4s;}
.star.lit{opacity:1;transform:scale(1.3);}
.wb{background:linear-gradient(90deg,#e8008a,#ff6600);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;padding:9px 20px;cursor:pointer;box-shadow:0 4px 0 #7a003a;margin:3px;}

/* DRESS-UP */
#scr-dressup{flex-direction:row;align-items:flex-start;gap:10px;padding:10px;overflow:hidden;}
#dd-left{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
#dd-stage{position:relative;width:min(180px,40vw);}
#dd-base-img{width:100%;display:block;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.4);}
#dd-outfit,#dd-acc{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#dd-acc{z-index:10;}
#dd-sparks{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;overflow:hidden;}
.dd-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.gb{background:linear-gradient(90deg,#e8008a,#ff6600);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;padding:7px 14px;cursor:pointer;box-shadow:0 3px 0 #7a003a;}
.gb.ghost{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);box-shadow:none;}
#dd-panel{flex:1;overflow-y:auto;max-height:88vh;}
#dd-panel::-webkit-scrollbar{width:3px;}#dd-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px;}
#dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sec-lbl{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);letter-spacing:2px;padding:5px 2px 2px;grid-column:1/-1;}
.ic{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);border-radius:12px;padding:5px 3px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;touch-action:none;transition:transform .12s,box-shadow .12s;}
.ic:active{transform:scale(1.08);box-shadow:0 5px 18px rgba(255,107,204,.7);}
.ic span{font-size:9px;font-weight:900;color:rgba(255,255,255,.8);text-align:center;line-height:1.2;}
#dd-ghost{position:fixed;pointer-events:none;z-index:9999;display:none;transform:translate(-50%,-50%) rotate(5deg) scale(1.1);}

/* DASHBOARD */
#scr-dash{overflow-y:auto;padding:14px;}
.dash-inner{width:100%;max-width:480px;}
.dash-stat{background:rgba(255,255,255,.12);border-radius:14px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.dash-stat span{font-size:13px;color:rgba(255,255,255,.7);font-weight:700;}
.dash-stat strong{font-size:18px;color:#ffd700;font-weight:900;}
.dash-row{background:rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.dash-row span{font-size:13px;color:#fff;font-weight:700;}
.dash-row em{font-size:11px;color:#ff6bcc;font-style:normal;}

/* COMMON */
.spark{position:absolute;width:10px;height:10px;border-radius:50%;animation:sp .7s ease-out forwards;pointer-events:none;}
@keyframes sp{0%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy));}}
.cfbit{position:fixed;width:10px;height:10px;border-radius:2px;animation:cfall 2.4s ease-in forwards;pointer-events:none;z-index:9998;}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0);}100%{opacity:0;transform:translateY(105vh) rotate(720deg);}}
@keyframes popIn{0%{transform:scale(.6);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
@keyframes shk{0%,100%{transform:translateX(0);}30%{transform:translateX(-6px);}70%{transform:translateX(6px);}}
</style>
</head>

<div id="app">
  <div id="hdr">
    <button id="back-btn">&#x276E; Menu</button>
    <h1>&#x1F9E9; Nerea Games</h1>
  </div>

  <!-- HOME -->
  <div id="scr-home" class="scr">
    <div class="home-title">&#x1F478; Nerea Games</div>
    <div class="home-sub">&#xA1;Elige tu juego favorito!</div>
    <div class="home-cards">
      <div class="home-card" id="home-puzzle">
        <div class="home-card-icon">&#x1F9E9;</div>
        <div class="home-card-text">
          <div class="home-card-name">Rompecabezas</div>
          <div class="home-card-desc">5 fotos para armar</div>
        </div>
        <div>&#x276F;</div>
      </div>
      <div class="home-card" id="home-dress">
        <div class="home-card-icon">&#x1F478;</div>
        <div class="home-card-text">
          <div class="home-card-name">Cambio de Look</div>
          <div class="home-card-desc">8 vestidos de princesa</div>
        </div>
        <div>&#x276F;</div>
      </div>
      <div class="home-card" id="home-dash">
        <div class="home-card-icon">&#x1F4CA;</div>
        <div class="home-card-text">
          <div class="home-card-name">Progreso</div>
          <div class="home-card-desc">Ver resultados y tiempos</div>
        </div>
        <div>&#x276F;</div>
      </div>
    </div>
  </div>

  <!-- PUZZLE MENU -->
  <div id="scr-puzzle-menu" class="scr" style="overflow-y:auto;padding:12px;">
    <div id="pm-grid" style="width:100%;max-width:520px;"></div>
  </div>

  <!-- PUZZLE GAME -->
  <div id="scr-puzzle" class="scr">
    <div id="p-stats">
      <span style="font-size:13px;">&#x23F1;</span>
      <span id="p-time" style="margin-left:4px;">00:00</span>
      <span style="color:rgba(255,255,255,.3);margin:0 6px;">|</span>
      <span id="p-moves">0 movimientos</span>
      <span style="flex:1"></span>
      <div id="stars-bar">
        <span class="star" id="s1">&#x2B50;</span>
        <span class="star" id="s2">&#x2B50;</span>
        <span class="star" id="s3">&#x2B50;</span>
      </div>
    </div>
    <div id="board-wrap"><canvas id="board-bg"></canvas><div id="p-board"></div></div>
    <div id="p-tray-wrap">
      <div id="p-tray-lbl">&#x2726; ARRASTRA LAS PIEZAS &#x2726;</div>
      <div id="p-tray"></div>
    </div>
    <div id="pw-wrap">
      <div id="pw-card">
        <h2>&#x1F389; Ganaste!</h2>
        <p id="pw-msg"></p>
        <button class="wb" id="pw-again">Otra vez</button>
        <button class="wb" id="pw-menu">Ver todos</button>
      </div>
    </div>
  </div>

  <!-- DRESS-UP -->
  <div id="scr-dressup" class="scr">
    <div id="dd-left">
      <div id="dd-stage">
        <img id="dd-base-img" alt="Nerea"/>
        <svg id="dd-outfit" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg"></svg>
        <svg id="dd-acc"    viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="dd-sparks"></div>
      </div>
      <div class="dd-btns">
        <button class="gb" id="dd-save">&#x2665; Guardar look</button>
        <button class="gb ghost" id="dd-reset">&#x2715; Quitar</button>
      </div>
    </div>
    <div id="dd-panel"><div id="dd-grid"></div></div>
  </div>

  <!-- DASHBOARD -->
  <div id="scr-dash" class="scr">
    <div class="dash-inner" id="dash-content"></div>
  </div>

</div>

<div id="p-ghost"><canvas id="ghost-cv"></canvas></div>
<div id="dd-ghost">
  <svg id="dd-ghost-svg" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg" style="width:88px;height:132px;display:block;"></svg>
</div>

// ─────────────────────────────────────────────
//  PUZZLE ENGINE
// ─────────────────────────────────────────────
function calcSZ(){
  var vw=Math.min(window.innerWidth,520);
  var vh=window.innerHeight;
  var avW=vw-24, avH=vh-62-44-110-36;
  return Math.max(60,Math.min(Math.floor((avW-GAP*(COLS-1))/COLS),Math.floor((avH-GAP*(ROWS-1))/ROWS),114));
}
function setStars(n){for(var i=1;i<=3;i++)gid('s'+i).classList.toggle('lit',i<=n);}
function getStars(){if(pSec<55&&pMoves<13)return 3;if(pSec<110&&pMoves<22)return 2;return 1;}
function startTimer(){clearInterval(pTimer);pSec=0;gid('p-time').textContent='00:00';pTimer=setInterval(function(){pSec++;gid('p-time').textContent=fmt(pSec);},1000);}
function makeSlice(img,idx){
  var col=idx%COLS,row=Math.floor(idx/ROWS);
  var sw=img.naturalWidth/COLS,sh=img.naturalHeight/ROWS;
  var cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;
  cv.getContext('2d').drawImage(img,col*sw,row*sh,sw,sh,0,0,SZ,SZ);return cv;
}
function drawBoardBg(img){
  var cv=gid('board-bg'),tw=SZ*COLS+GAP*(COLS-1),th=SZ*ROWS+GAP*(ROWS-1);
  cv.width=tw;cv.height=th;
  var ctx=cv.getContext('2d');ctx.drawImage(img,0,0,tw,th);
  ctx.fillStyle='rgba(12,0,35,.58)';ctx.fillRect(0,0,tw,th);
}
function buildBoard(){
  SZ=calcSZ();var board=gid('p-board');board.innerHTML='';
  var tw=SZ*COLS+GAP*(COLS-1);
  board.style.cssText='display:grid;grid-template-columns:repeat('+COLS+','+SZ+'px);grid-template-rows:repeat('+ROWS+','+SZ+'px);gap:'+GAP+'px;width:'+tw+'px;';
  gid('board-wrap').style.width=tw+'px';pCells=[];
  for(var i=0;i<N;i++){
    var c=document.createElement('div');c.className='pcell';c.style.width=SZ+'px';c.style.height=SZ+'px';
    var sh=document.createElement('div');sh.className='shine';c.appendChild(sh);board.appendChild(c);
    pCells.push({el:c,filled:false,pieceIdx:-1});
  }
}
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=0|Math.random()*(i+1),t=arr[i];arr[i]=arr[j];arr[j]=t;}}
function buildPieces(img){
  var tray=gid('p-tray');tray.innerHTML='';pPieces=[];
  var order=[];for(var i=0;i<N;i++)order.push(i);shuffle(order);
  order.forEach(function(idx){
    var wrap=document.createElement('div');wrap.className='piece';wrap.style.width=SZ+'px';wrap.style.height=SZ+'px';
    wrap.appendChild(makeSlice(img,idx));tray.appendChild(wrap);
    var p={el:wrap,idx:idx,placed:false,inCell:-1};pPieces.push(p);
    (function(pp){
      wrap.addEventListener('mousedown',function(e){e.preventDefault();pStartDrag(pp,e.clientX,e.clientY);});
      wrap.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];pStartDrag(pp,t.clientX,t.clientY);},{passive:false});
    })(p);
  });
}
function pStartDrag(p,cx,cy){
  if(pOver)return;
  if(p.placed){
    var ci=p.inCell;pCells[ci].filled=false;pCells[ci].pieceIdx=-1;
    pCells[ci].el.classList.remove('correct','glow');pCells[ci].el.innerHTML='';
    var sh=document.createElement('div');sh.className='shine';pCells[ci].el.appendChild(sh);
    if(p.idx===ci){pSolved=Math.max(0,pSolved-1);setStars(getStars());}
    p.placed=false;p.inCell=-1;p.el.classList.remove('gold');p.el.style.animation='';
    while(p.el.firstChild)p.el.removeChild(p.el.firstChild);
    p.el.appendChild(makeSlice(puzzleSrc,p.idx));gid('p-tray').appendChild(p.el);
  }
  pDrag=p;p.el.classList.add('dragging');
  var gc=gid('ghost-cv');gc.width=SZ;gc.height=SZ;gc.getContext('2d').drawImage(p.el.querySelector('canvas'),0,0);
  var gh=gid('p-ghost');gh.style.width=SZ+'px';gh.style.height=SZ+'px';gh.style.display='block';
  pMoveGhost(cx,cy);
}
function pMoveGhost(cx,cy){var g=gid('p-ghost');g.style.left=cx+'px';g.style.top=cy+'px';}
function pEndDrag(cx,cy){
  if(!pDrag)return;gid('p-ghost').style.display='none';pDrag.el.classList.remove('dragging');
  pCells.forEach(function(c){c.el.classList.remove('phover');});
  var ci=pGetCellAt(cx,cy);if(ci>=0&&!pCells[ci].filled)pDropOnCell(ci,pDrag);pDrag=null;
}
function pGetCellAt(cx,cy){for(var i=0;i<pCells.length;i++){var r=pCells[i].el.getBoundingClientRect();if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom)return i;}return -1;}
function pDropOnCell(ci,p){
  pMoves++;gid('p-moves').textContent=pMoves+(pMoves===1?' movimiento':' movimientos');
  var cell=pCells[ci];
  while(p.el.firstChild)p.el.removeChild(p.el.firstChild);p.el.appendChild(makeSlice(puzzleSrc,p.idx));
  p.el.style.width=SZ+'px';p.el.style.height=SZ+'px';cell.el.innerHTML='';
  var sh=document.createElement('div');sh.className='shine';cell.el.appendChild(sh);
  cell.el.appendChild(p.el);cell.filled=true;cell.pieceIdx=p.idx;p.placed=true;p.inCell=ci;
  if(p.idx===ci){
    pSolved++;cell.el.classList.add('correct');playOK();p.el.style.animation='popIn .4s ease forwards';p.el.classList.add('gold');
    requestAnimationFrame(function(){cell.el.classList.add('glow');});setStars(getStars());
    if(pSolved===N)setTimeout(showPuzzleWin,500);
  }else{playWrong();cell.el.style.animation='none';void cell.el.offsetWidth;cell.el.style.animation='shk .25s ease';}
}
function showPuzzleWin(){
  clearInterval(pTimer);pOver=true;var st=getStars();setStars(st);
  var prev=bestScores[puzzleIdx];
  if(!prev||st>prev.stars||(st===prev.stars&&pSec<prev.sec))bestScores[puzzleIdx]={stars:st,sec:pSec,moves:pMoves};
  var msgs=['Muy bien!','Excelente!','Eres una campeona!'];
  gid('pw-msg').textContent=msgs[st-1]+'\n'+fmt(pSec)+' | '+pMoves+' movimientos';
  gid('pw-wrap').classList.add('show');launchConfetti();
}
function initPuzzle(idx){
  puzzleIdx=idx;pOver=false;pMoves=0;pSolved=0;pDrag=null;puzzleSrc=null;
  gid('p-moves').textContent='0 movimientos';gid('pw-wrap').classList.remove('show');
  setStars(0);buildBoard();
  var img=new Image();
  img.onload=function(){puzzleSrc=img;drawBoardBg(img);buildPieces(img);startTimer();};
  img.src=puzzleUrls[idx];
}

// ─────────────────────────────────────────────
//  DRESS-UP ENGINE
// ─────────────────────────────────────────────
function ddRender(){
  var ol=gid('dd-outfit'),al=gid('dd-acc');
  ol.innerHTML=dressWorn?OUTFITS[dressWorn].p():'';
  var h='';Object.keys(dressAccs).forEach(function(k){if(dressAccs[k])h+=ACCS[k].p();});al.innerHTML=h;
}
function ddThumb(html){return '<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg" style="width:56px;height:84px;display:block">'+html+'</svg>';}
function buildDDPanel(){
  var g=gid('dd-grid');g.innerHTML='';
  var sl=document.createElement('div');sl.className='sec-lbl';sl.textContent='VESTIDOS';g.appendChild(sl);
  Object.keys(OUTFITS).forEach(function(k){
    var c=document.createElement('div');c.className='ic';
    c.innerHTML=ddThumb(OUTFITS[k].p())+'<span>'+OUTFITS[k].name+'</span>';
    c.dataset.t='o';c.dataset.k=k;ddBind(c);g.appendChild(c);
  });
  var al=document.createElement('div');al.className='sec-lbl';al.textContent='ACCESORIOS';g.appendChild(al);
  Object.keys(ACCS).forEach(function(k){
    var c=document.createElement('div');c.className='ic';
    c.innerHTML=ddThumb(ACCS[k].p())+'<span>'+ACCS[k].name+'</span>';
    c.dataset.t='a';c.dataset.k=k;ddBind(c);g.appendChild(c);
  });
}
function ddBind(card){
  function start(cx,cy){
    ddDrag={t:card.dataset.t,k:card.dataset.k};var gs=gid('dd-ghost-svg');
    gs.innerHTML=ddDrag.t==='o'?OUTFITS[ddDrag.k].p():ACCS[ddDrag.k].p();
    gid('dd-ghost').style.display='block';ddMg(cx,cy);
  }
  card.addEventListener('mousedown',function(e){e.preventDefault();start(e.clientX,e.clientY);});
  card.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];start(t.clientX,t.clientY);},{passive:false});
}
function ddMg(cx,cy){var d=gid('dd-ghost');d.style.left=cx+'px';d.style.top=cy+'px';}
function ddEndDrag(cx,cy){
  if(!ddDrag)return;gid('dd-ghost').style.display='none';
  var s=gid('dd-stage'),r=s.getBoundingClientRect();
  if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
    if(ddDrag.t==='o')dressWorn=ddDrag.k;else dressAccs[ddDrag.k]=!dressAccs[ddDrag.k];
    ddRender();sparks(gid('dd-sparks'),cx-r.left,cy-r.top);playChime();
  }ddDrag=null;
}

// ─────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────
function playOK(){try{var ac=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+i*.09);g.gain.linearRampToValueAtTime(.15,ac.currentTime+i*.09+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.09+.22);o.start(ac.currentTime+i*.09);o.stop(ac.currentTime+i*.09+.25);});}catch(e){}}
function playWrong(){try{var ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=200;o.type='sine';g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.14);o.start(ac.currentTime);o.stop(ac.currentTime+.16);}catch(e){}}
function playChime(){try{var ac=new(window.AudioContext||window.webkitAudioContext)();[1047,1319,1568,2093].forEach(function(f,i){var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,ac.currentTime+i*.07);g.gain.linearRampToValueAtTime(.1,ac.currentTime+i*.07+.02);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.07+.22);o.start(ac.currentTime+i*.07);o.stop(ac.currentTime+i*.07+.25);});}catch(e){}}

// ─────────────────────────────────────────────
//  SPARKLES / CONFETTI
// ─────────────────────────────────────────────
function sparks(wrap,x,y){
  var c=['#ffd700','#ff6bcc','#fff','#42e2ff','#ff6600','#ff88aa','#a8ff60'];
  for(var i=0;i<18;i++){var sp=document.createElement('div');sp.className='spark';var a=Math.random()*360,d=22+Math.random()*48;sp.style.left=x+'px';sp.style.top=y+'px';sp.style.background=c[0|Math.random()*c.length];sp.style.setProperty('--dx',(Math.cos(a*Math.PI/180)*d)+'px');sp.style.setProperty('--dy',(Math.sin(a*Math.PI/180)*d)+'px');sp.style.animationDelay=(Math.random()*.1)+'s';wrap.appendChild(sp);sp.addEventListener('animationend',function(){this.remove();});}
}
function launchConfetti(){
  var c=['#ff6bcc','#ff6600','#ffd700','#42e2ff','#a0ff42','#fff'];
  for(var i=0;i<60;i++){var el=document.createElement('div');el.className='cfbit';el.style.left=Math.random()*100+'vw';el.style.top='-10px';el.style.background=c[0|Math.random()*c.length];el.style.animationDelay=Math.random()*1.4+'s';el.style.animationDuration=(1.6+Math.random()*.9)+'s';document.body.appendChild(el);el.addEventListener('animationend',function(){this.remove();});}
}

// ─────────────────────────────────────────────
//  NAVEGACIÓN
// ─────────────────────────────────────────────
function showScreen(id){
  ['home','puzzle-menu','puzzle','dressup','dash'].forEach(function(s){
    var el=gid('scr-'+s);if(el)el.style.display='none';
  });var el=gid('scr-'+id);if(el)el.style.display='flex';
  var bb=gid('back-btn');if(bb)bb.style.display=id==='home'?'none':'block';
  screen=id;
}
function goBack(){
  if(screen==='puzzle')showScreen('puzzle-menu');
  else if(screen==='puzzle-menu'||screen==='dressup'||screen==='dash')showScreen('home');
}

// ─────────────────────────────────────────────
//  DASHBOARD
// ─────────────────────────────────────────────
function buildDash(){
  var d=gid('dash-content');d.innerHTML='';
  var total=0,stars=0;
  PUZZLES.forEach(function(pz,i){var b=bestScores[i];if(b){total++;stars+=b.stars;}});
  d.innerHTML='<div class="dash-stat"><span>Rompecabezas jugados</span><strong>'+total+' / '+PUZZLES.length+'</strong></div>'
    +'<div class="dash-stat"><span>Estrellas totales</span><strong>'+stars+' / '+(PUZZLES.length*3)+'</strong></div>';
  PUZZLES.forEach(function(pz,i){
    var b=bestScores[i];
    var s=b?('⏱ '+fmt(b.sec)+' · '+b.moves+' movs · '+'⭐'.repeat(b.stars)):'Sin jugar';
    d.innerHTML+='<div class="dash-row"><span>'+pz.emoji+' '+pz.label+'</span><em>'+s+'</em></div>';
  });
}

// ─────────────────────────────────────────────
//  PUZZLE MENU
// ─────────────────────────────────────────────
function buildPuzzleMenu(){
  var g=gid('pm-grid');g.innerHTML='';
  PUZZLES.forEach(function(pz,i){
    var card=document.createElement('div');card.className='pm-card';
    var best=bestScores[i];var bestTxt=best?('Mejor: '+fmt(best.sec)+' | '+'⭐'.repeat(best.stars)):'Sin jugar';
    var thumb=document.createElement('img');thumb.className='pm-thumb';thumb.src=puzzleUrls[i];
    card.appendChild(thumb);
    var info=document.createElement('div');info.className='pm-info';
    info.innerHTML='<div class="pm-name">'+pz.label+'</div><div class="pm-best">'+bestTxt+'</div>';
    card.appendChild(info);
    var em=document.createElement('div');em.className='pm-emoji';em.textContent=pz.emoji;
    card.appendChild(em);
    (function(ii){card.addEventListener('click',function(){showScreen('puzzle');initPuzzle(ii);});})(i);
    g.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  GLOBAL EVENT LISTENERS
// ─────────────────────────────────────────────
document.addEventListener('mousemove',function(e){
  if(pDrag)pMoveGhost(e.clientX,e.clientY);
  if(ddDrag)ddMg(e.clientX,e.clientY);
  if(pDrag){pCells.forEach(function(c){var r=c.el.getBoundingClientRect();c.el.classList.toggle('phover',e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom&&!c.filled);});}
});
document.addEventListener('mouseup',function(e){if(pDrag)pEndDrag(e.clientX,e.clientY);if(ddDrag)ddEndDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',function(e){
  if(pDrag||ddDrag){e.preventDefault();var t=e.touches[0];if(pDrag)pMoveGhost(t.clientX,t.clientY);if(ddDrag)ddMg(t.clientX,t.clientY);}
  if(pDrag){var t2=e.touches[0];pCells.forEach(function(c){var r=c.el.getBoundingClientRect();c.el.classList.toggle('phover',t2.clientX>=r.left&&t2.clientX<=r.right&&t2.clientY>=r.top&&t2.clientY<=r.bottom&&!c.filled);});}
},{passive:false});
document.addEventListener('touchend',function(e){var t=e.changedTouches[0];if(pDrag)pEndDrag(t.clientX,t.clientY);if(ddDrag)ddEndDrag(t.clientX,t.clientY);});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init(){
  // Init puzzle URLs from base64
  puzzleUrls=PUZZLES.map(function(p){
    var bin=atob(p.b64),arr=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr],{type:'image/jpeg'}));
  });

  // Set dress-up base image
  var nImg=gid('dd-base-img');
  if(nImg){
    var bin2=atob(NEREA_B64),arr2=new Uint8Array(bin2.length);
    for(var i=0;i<bin2.length;i++)arr2[i]=bin2.charCodeAt(i);
    nImg.src=URL.createObjectURL(new Blob([arr2],{type:'image/jpeg'}));
  }

  // Build panels
  buildDDPanel();

  // Wire buttons
  var bb=gid('back-btn');if(bb)bb.addEventListener('click',goBack);
  var hpz=gid('home-puzzle');if(hpz)hpz.addEventListener('click',function(){buildPuzzleMenu();showScreen('puzzle-menu');});
  var hdd=gid('home-dress');if(hdd)hdd.addEventListener('click',function(){showScreen('dressup');});
  var hda=gid('home-dash');if(hda)hda.addEventListener('click',function(){buildDash();showScreen('dash');});
  var pba=gid('pw-again');if(pba)pba.addEventListener('click',function(){initPuzzle(puzzleIdx);});
  var pbm=gid('pw-menu');if(pbm)pbm.addEventListener('click',function(){buildPuzzleMenu();showScreen('puzzle-menu');});
  var drs=gid('dd-save');if(drs)drs.addEventListener('click',function(){playChime();drs.textContent='✓ Guardado!';setTimeout(function(){drs.textContent='♥ Guardar look';},1800);});
  var drr=gid('dd-reset');if(drr)drr.addEventListener('click',function(){dressWorn=null;dressAccs={};ddRender();});

  showScreen('home');
}

init();
})();
