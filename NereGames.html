<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nerea Games"/>
<meta name="theme-color" content="#e8008a"/>
<title>Nerea Games</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html,body{height:100%;overflow:hidden;background:#1a0533;}
#app{font-family:'Nunito',sans-serif;height:100vh;background:linear-gradient(160deg,#1a0533 0%,#3d0a6e 50%,#1a0533 100%);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
#header{width:100%;flex-shrink:0;background:linear-gradient(90deg,#e8008a,#ff6600);padding:10px 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #7a003a;position:relative;}
#header h1{font-size:clamp(16px,5vw,26px);color:#fff;text-shadow:0 3px 0 #7a003a;letter-spacing:2px;}
#stars-bar{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:2px;}
.star{font-size:17px;opacity:.25;transition:opacity .3s,transform .4s;}
.star.lit{opacity:1;transform:scale(1.3);}
#back-btn{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:20px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;padding:4px 10px;cursor:pointer;display:none;}
#menu{display:flex;flex-direction:column;align-items:center;gap:12px;padding:14px 12px;width:100%;max-width:520px;overflow-y:auto;flex:1;}
#menu h2{font-size:clamp(16px,4vw,22px);color:#ff6bcc;font-weight:900;margin-bottom:2px;}
.puzzle-card{width:100%;background:rgba(255,255,255,.12);border-radius:18px;border:3px solid rgba(255,255,255,.25);padding:10px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s,background .15s;-webkit-tap-highlight-color:transparent;}
.puzzle-card:active{transform:scale(.97);background:rgba(255,255,255,.22);}
.puzzle-thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;border:3px solid rgba(255,255,255,.4);flex-shrink:0;background:#333;}
.puzzle-info{flex:1;}
.puzzle-name{font-size:clamp(14px,3.5vw,17px);color:#fff;font-weight:900;}
.puzzle-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px;}
.best-score{font-size:11px;color:#ffd700;margin-top:2px;}
.puzzle-emoji{font-size:26px;flex-shrink:0;}
#game{display:none;flex-direction:column;align-items:center;gap:8px;padding:8px 10px 0;width:100%;max-width:520px;flex:1;overflow:hidden;}
#stats-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border-radius:50px;border:2px solid rgba(255,255,255,.25);padding:5px 14px;flex-shrink:0;}
#timer-txt{font-size:clamp(13px,3vw,16px);font-weight:900;color:#ff6bcc;}
#moves-txt{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,.8);font-weight:700;}
#board-wrap{position:relative;border-radius:14px;overflow:hidden;border:4px solid rgba(255,255,255,.35);box-shadow:0 0 30px rgba(232,0,138,.4),0 6px 0 rgba(0,0,0,.3);flex-shrink:0;}
#board-bg-cv{position:absolute;inset:0;z-index:0;display:block;}
#board{display:grid;gap:3px;position:relative;z-index:1;}
.cell{position:relative;overflow:hidden;background:transparent;border:2px dashed rgba(255,255,255,.28);border-radius:5px;transition:border-color .15s;}
.cell.hover-ok{border:3px solid #ff6bcc;box-shadow:inset 0 0 10px rgba(255,107,204,.5);}
.cell.correct{border:2px solid transparent!important;}
.shine{position:absolute;inset:0;z-index:10;pointer-events:none;border-radius:5px;background:linear-gradient(135deg,rgba(255,255,255,.75) 0%,rgba(255,255,180,.3) 40%,rgba(255,255,255,0) 65%);opacity:0;transition:opacity .5s;}
.cell.glow .shine{opacity:1;}
#tray-wrap{background:rgba(255,255,255,.1);border-radius:18px;border:3px solid rgba(255,255,255,.22);padding:8px 10px;width:100%;max-width:520px;flex-shrink:0;}
#tray-label{font-size:10px;font-weight:900;color:rgba(255,255,255,.5);text-align:center;letter-spacing:2px;margin-bottom:5px;}
#tray{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;min-height:50px;}
.piece{border-radius:7px;border:3px solid rgba(255,255,255,.6);box-shadow:0 4px 10px rgba(0,0,0,.4);overflow:hidden;flex-shrink:0;cursor:grab;touch-action:none;background:#111;}
.piece.dragging{opacity:.2;}
.piece.gold{border:3px solid #ffd700!important;box-shadow:0 0 14px 4px rgba(255,215,0,.8)!important;}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;border-radius:7px;overflow:hidden;border:3px solid #fff;box-shadow:0 10px 28px rgba(255,107,204,.7);display:none;transform:translate(-50%,-50%) rotate(4deg) scale(1.1);}
#win-wrap{display:none;min-height:260px;width:100%;align-items:center;justify-content:center;background:rgba(0,0,10,.65);flex-shrink:0;}
#win-wrap.show{display:flex;}
#win-card{background:rgba(40,0,80,.95);border-radius:24px;border:4px solid rgba(255,255,255,.3);padding:20px 24px;text-align:center;max-width:270px;width:88%;}
#win-card h2{font-size:32px;color:#ff6bcc;text-shadow:0 3px 0 #e8008a;}
#win-card p{font-size:13px;color:#fff;margin:8px 0 14px;font-weight:700;line-height:1.6;white-space:pre-line;}
.win-btn{background:linear-gradient(90deg,#e8008a,#ff6600);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;padding:9px 20px;cursor:pointer;box-shadow:0 4px 0 #7a003a;margin:3px;}
.cfbit{position:fixed;width:10px;height:10px;border-radius:2px;animation:cfall 2.4s ease-in forwards;pointer-events:none;z-index:9998;}
@keyframes cfall{0%{opacity:1;transform:translateY(-10px) rotate(0);}100%{opacity:0;transform:translateY(105vh) rotate(720deg);}}
@keyframes popIn{0%{transform:scale(.6);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
@keyframes shk{0%,100%{transform:translateX(0);}30%{transform:translateX(-6px);}70%{transform:translateX(6px);}}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="back-btn" onclick="showMenu()">&#x276E; Menu</button>
    <h1>&#x1F9E9; Nerea Games</h1>
    <div id="stars-bar">
      <span class="star" id="s1">&#x2B50;</span>
      <span class="star" id="s2">&#x2B50;</span>
      <span class="star" id="s3">&#x2B50;</span>
    </div>
  </div>
  <div id="menu"></div>
  <div id="game">
    <div id="stats-bar">
      <span style="font-size:13px;">&#x23F1;</span>
      <span id="timer-txt" style="margin-left:4px;">00:00</span>
      <span style="color:rgba(255,255,255,.3);margin:0 6px;">|</span>
      <span id="moves-txt">0 movimientos</span>
    </div>
    <div id="board-wrap">
      <canvas id="board-bg-cv"></canvas>
      <div id="board"></div>
    </div>
    <div id="tray-wrap">
      <div id="tray-label">&#x2726; ARRASTRA LAS PIEZAS &#x2726;</div>
      <div id="tray"></div>
    </div>
    <div id="win-wrap">
      <div id="win-card">
        <h2>&#x1F389; Ganaste!</h2>
        <p id="win-msg"></p>
        <button class="win-btn" id="btn-again">Otra vez</button>
        <button class="win-btn" id="btn-menu">Ver todos</button>
      </div>
    </div>
  </div>
</div>
<div id="drag-ghost"><canvas id="ghost-cv"></canvas></div>

    [523,659,784,1047].forEach(function(f,i){
      var o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(0, ac.currentTime+i*.09);
      g.gain.linearRampToValueAtTime(.15, ac.currentTime+i*.09+.02);
      g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+i*.09+.22);
      o.start(ac.currentTime+i*.09); o.stop(ac.currentTime+i*.09+.25);
    });
  }catch(e){}
}

function playWrong(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value=200; o.type='sine';
    g.gain.setValueAtTime(.1, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime+.14);
    o.start(ac.currentTime); o.stop(ac.currentTime+.16);
  }catch(e){}
}

function makeSlice(img, idx){
  var col=idx%COLS, row=Math.floor(idx/ROWS);
  var sw=img.naturalWidth/COLS, sh=img.naturalHeight/ROWS;
  var cv=document.createElement('canvas');
  cv.width=SZ; cv.height=SZ;
  cv.getContext('2d').drawImage(img, col*sw, row*sh, sw, sh, 0,0, SZ, SZ);
  return cv;
}

function drawBoardBg(img){
  var cv=gid('board-bg-cv');
  var tw=SZ*COLS+GAP*(COLS-1), th=SZ*ROWS+GAP*(ROWS-1);
  cv.width=tw; cv.height=th;
  var ctx=cv.getContext('2d');
  ctx.drawImage(img, 0,0, tw, th);
  ctx.fillStyle='rgba(12,0,35,.58)';
  ctx.fillRect(0,0,tw,th);
}

function buildBoard(){
  SZ=calcSZ();
  var board=gid('board'); board.innerHTML='';
  var tw=SZ*COLS+GAP*(COLS-1);
  board.style.cssText='display:grid;grid-template-columns:repeat('+COLS+','+SZ+'px);grid-template-rows:repeat('+ROWS+','+SZ+'px);gap:'+GAP+'px;width:'+tw+'px;';
  gid('board-wrap').style.width=tw+'px';
  cells=[];
  for(var i=0;i<N;i++){
    var c=document.createElement('div');
    c.className='cell'; c.style.width=SZ+'px'; c.style.height=SZ+'px';
    var sh=document.createElement('div'); sh.className='shine'; c.appendChild(sh);
    board.appendChild(c);
    cells.push({el:c, filled:false, pieceIdx:-1});
  }
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=0|Math.random()*(i+1), t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
}

function buildPieces(img){
  var tray=gid('tray'); tray.innerHTML=''; pieces=[];
  var order=[]; for(var i=0;i<N;i++) order.push(i);
  shuffle(order);
  order.forEach(function(idx){
    var wrap=document.createElement('div');
    wrap.className='piece'; wrap.style.width=SZ+'px'; wrap.style.height=SZ+'px';
    wrap.appendChild(makeSlice(img,idx));
    tray.appendChild(wrap);
    var p={el:wrap, idx:idx, placed:false, inCell:-1};
    pieces.push(p);
    (function(pp){
      wrap.addEventListener('mousedown',function(e){e.preventDefault();startDrag(pp,e.clientX,e.clientY);});
      wrap.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];startDrag(pp,t.clientX,t.clientY);},{passive:false});
    })(p);
  });
}

function startDrag(p,cx,cy){
  if(over)return;
  if(p.placed){
    var ci=p.inCell;
    cells[ci].filled=false; cells[ci].pieceIdx=-1;
    cells[ci].el.classList.remove('correct','glow');
    cells[ci].el.innerHTML='';
    var sh=document.createElement('div'); sh.className='shine'; cells[ci].el.appendChild(sh);
    if(p.idx===ci){ solved=Math.max(0,solved-1); setStars(getStars()); }
    p.placed=false; p.inCell=-1;
    p.el.classList.remove('gold'); p.el.style.animation='';
    while(p.el.firstChild) p.el.removeChild(p.el.firstChild);
    p.el.appendChild(makeSlice(srcImg,p.idx));
    gid('tray').appendChild(p.el);
  }
  drag=p; p.el.classList.add('dragging');
  var gc=gid('ghost-cv'); gc.width=SZ; gc.height=SZ;
  gc.getContext('2d').drawImage(p.el.querySelector('canvas'),0,0);
  var gh=gid('drag-ghost');
  gh.style.width=SZ+'px'; gh.style.height=SZ+'px'; gh.style.display='block';
  moveGhost(cx,cy);
}

function moveGhost(cx,cy){
  var gh=gid('drag-ghost'); gh.style.left=cx+'px'; gh.style.top=cy+'px';
}

function endDrag(cx,cy){
  if(!drag)return;
  gid('drag-ghost').style.display='none';
  drag.el.classList.remove('dragging');
  cells.forEach(function(c){ c.el.classList.remove('hover-ok'); });
  var ci=getCellAt(cx,cy);
  if(ci>=0&&!cells[ci].filled) dropOnCell(ci,drag);
  drag=null;
}

function getCellAt(cx,cy){
  for(var i=0;i<cells.length;i++){
    var r=cells[i].el.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) return i;
  }
  return -1;
}

function dropOnCell(ci,p){
  moves++;
  gid('moves-txt').textContent=moves+(moves===1?' movimiento':' movimientos');
  var cell=cells[ci];
  while(p.el.firstChild) p.el.removeChild(p.el.firstChild);
  p.el.appendChild(makeSlice(srcImg,p.idx));
  p.el.style.width=SZ+'px'; p.el.style.height=SZ+'px';
  cell.el.innerHTML='';
  var sh=document.createElement('div'); sh.className='shine'; cell.el.appendChild(sh);
  cell.el.appendChild(p.el);
  cell.filled=true; cell.pieceIdx=p.idx; p.placed=true; p.inCell=ci;
  if(p.idx===ci){
    solved++; cell.el.classList.add('correct'); playOK();
    p.el.style.animation='popIn .4s ease forwards'; p.el.classList.add('gold');
    requestAnimationFrame(function(){ cell.el.classList.add('glow'); });
    setStars(getStars());
    if(solved===N) setTimeout(showWin,500);
  } else {
    playWrong();
    cell.el.style.animation='none'; void cell.el.offsetWidth; cell.el.style.animation='shk .25s ease';
  }
}

document.addEventListener('mousemove',function(e){
  if(!drag)return;
  moveGhost(e.clientX,e.clientY);
  cells.forEach(function(c){
    var r=c.el.getBoundingClientRect();
    c.el.classList.toggle('hover-ok',e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom&&!c.filled);
  });
});
document.addEventListener('mouseup',function(e){ if(drag)endDrag(e.clientX,e.clientY); });
document.addEventListener('touchmove',function(e){
  if(!drag)return; e.preventDefault();
  var t=e.touches[0]; moveGhost(t.clientX,t.clientY);
  cells.forEach(function(c){
    var r=c.el.getBoundingClientRect();
    c.el.classList.toggle('hover-ok',t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom&&!c.filled);
  });
},{passive:false});
document.addEventListener('touchend',function(e){
  if(drag){ var t=e.changedTouches[0]; endDrag(t.clientX,t.clientY); }
});

function launchConfetti(){
  var c=['#ff6bcc','#ff6600','#ffd700','#42e2ff','#a0ff42','#fff'];
  for(var i=0;i<55;i++){
    var el=document.createElement('div'); el.className='cfbit';
    el.style.left=Math.random()*100+'vw'; el.style.top='-10px';
    el.style.background=c[0|Math.random()*c.length];
    el.style.animationDelay=Math.random()*1.4+'s';
    el.style.animationDuration=(1.6+Math.random()*.9)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend',function(){ this.remove(); });
  }
}

function showWin(){
  clearInterval(tInt); over=true;
  var st=getStars(); setStars(st);
  var prev=bestScores[curIdx];
  if(!prev||st>prev.stars||(st===prev.stars&&sec<prev.sec)){
    bestScores[curIdx]={stars:st,sec:sec,moves:moves};
  }
  var msgs=['Muy bien!','Excelente!','Eres una campeona!'];
  gid('win-msg').textContent=msgs[st-1]+'\n'+fmt(sec)+' | '+moves+' movimientos';
  gid('win-wrap').classList.add('show');
  launchConfetti();
}

function loadAndStart(idx){
  var img=new Image();
  img.onload=function(){
    srcImg=img;
    drawBoardBg(img);
    buildPieces(img);
    startTimer();
  };
  img.onerror=function(){ alert('No se pudo cargar la imagen '+idx); };
  img.src=PUZZLE_URLS[idx];
}

function startPuzzle(idx){
  curIdx=idx; over=false; moves=0; solved=0; drag=null; srcImg=null;
  gid('moves-txt').textContent='0 movimientos';
  gid('win-wrap').classList.remove('show');
  setStars(0);
  gid('menu').style.display='none';
  gid('game').style.display='flex';
  gid('back-btn').style.display='block';
  buildBoard();
  loadAndStart(idx);
}

function showMenu(){
  clearInterval(tInt);
  gid('game').style.display='none';
  gid('menu').style.display='flex';
  gid('back-btn').style.display='none';
  gid('stars-bar').innerHTML='<span class="star" id="s1">&#x2B50;</span><span class="star" id="s2">&#x2B50;</span><span class="star" id="s3">&#x2B50;</span>';
  buildMenu();
}

function buildMenu(){
  var menu=gid('menu'); menu.innerHTML='<h2>Elige tu rompecabezas</h2>';
  PUZZLES.forEach(function(pz,i){
    var card=document.createElement('div'); card.className='puzzle-card';
    var thumb=document.createElement('img');
    thumb.className='puzzle-thumb'; thumb.src=PUZZLE_URLS[i];
    card.appendChild(thumb);
    var info=document.createElement('div'); info.className='puzzle-info';
    var best=bestScores[i];
    var bestTxt=best?('Mejor: '+fmt(best.sec)+' | '+best.stars+' estrellas'):'Sin jugar aun';
    info.innerHTML='<div class="puzzle-name">'+pz.label+'</div>'
      +'<div class="puzzle-sub">9 piezas</div>'
      +'<div class="best-score">'+bestTxt+'</div>';
    card.appendChild(info);
    var em=document.createElement('div'); em.className='puzzle-emoji'; em.textContent=pz.emoji;
    card.appendChild(em);
    (function(ii){ card.addEventListener('click',function(){ startPuzzle(ii); }); })(i);
    menu.appendChild(card);
  });
}

gid('btn-again').addEventListener('click',function(){ startPuzzle(curIdx); });
gid('btn-menu').addEventListener('click',showMenu);

// Set apple touch icon
var li=document.createElement('link'); li.rel='apple-touch-icon';
li.href=b64toURL(ICON_B64,'image/png');
document.head.appendChild(li);

// Init
initBlobURLs();
buildMenu();

})();
</script>
